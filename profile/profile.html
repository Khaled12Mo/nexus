    <title>Profile</title>
    <link rel="stylesheet" href="./profile.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <nav class="sidebar">
     
        <div>
            <h1 ><a class="nexus" href="../index.html">NEXUS</a></h1>
        </div>
        <ul class="nav-list">
            <li><a class="nav-item" href="../index.html"><i class="bi bi-house-door"></i>HOME</a></li>
            <li><a class="nav-item" href="../library/library.html"><i class="bi bi-controller"></i>LIBRARY</a></li>
            <li><a class="nav-item" href="../search/search.html"><i class="bi bi-search"></i>SEARCH</a></li>

    <!-- Main Content Area -->
    <main class="main-content">
        
        <div class="top-section">
            <div class="profile-card">
                <div class="avatar-wrapper">
                    <img src="../images/man.png" alt="User Avatar" class="avatar-img">
                    <div class="edit-btn">
                        <i class="bi bi-pen"></i>
                    </div>
                </div>
                
                <div class="user-details">
                    <h1>CYBER_KNIGHT</h1>
                    <p class="user-name">Elite Tier Subscriber</p>
                    <div class="tags">
                        <span class="tag">FPS</span>
                        <span class="tag">RPG</span>
                        <span class="tag">STREAMER</span>
                    </div>
                </div>
            </div>

            <!-- Stats Side Cards -->
            <div class="stats-section">
                
                <div class="stat-card">
                    <i class="fa-solid fa-medal"></i>
                    <h2>124</h2>
                    <p>ACHIEVEMENTS</p>
                </div>

                <div class="stat-card">
                    <i class="fa-solid fa-stopwatch"></i>
                    <h2>842h</h2>
                    <p>PLAYTIME</p>
                </div>
            </div>
        </div>
