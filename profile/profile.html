</head>
<body>

    <aside class="sidebar">     
        <div class="logo">NEXUS</div>
        
        <nav class="nav-menu">
            <a href="../home/index.html" class="nav-item"><i class="fa-solid fa-house"></i> <p>HOME</p></a>
            <a href="../library/library.html" class="nav-item"><i class="fa-solid fa-gamepad"></i> <p>LIBRARY</p></a>

            <a href="../support/support.html" class="nav-item"><i class="fa-regular fa-circle-question"></i> <p>SUPPORT</p></a>

            <a href="../settings/index.html" class="nav-item"><i class="fa-solid fa-gear"></i> <p>SETTINGS</p></a>

    <main class="main-content">
        
        <div class="top-section">
            <div class="profile-card">
                <div class="avatar-wrapper">
                    <img src="./images/istockphoto-1934800957-612x612.jpg" alt="User Avatar" class="avatar-img">
                    <div class="edit-btn">
                        <i class="fa-solid fa-pen"></i>
                    </div>
                </div>

                    <h1>CYBER_KNIGHT</h1>
                    <p>Elite Tier Subscriber</p>
                    <div class="tags">
                        <span class="tag">FPS</span>
                        <span class="tag">RPG</span>

                    </div>
                </div>
            </div>

            <!-- Stats Side Cards -->
            <div class="stats-section">
                
                <div class="stat-card">
                    <i class="fa-solid fa-medal"></i>
                    <h2>124</h2>
                    <p>ACHIEVEMENTS</p>
                </div>

                <div class="stat-card">
                    <i class="fa-solid fa-stopwatch"></i>
                    <h2>842h</h2>
                    <p>PLAYTIME</p>
                </div>
            </div>
        </div>
